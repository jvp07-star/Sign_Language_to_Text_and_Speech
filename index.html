<!DOCTYPE html>
<html>
<head>
    <title>Sign Language Translator</title>
</head>
<body style="text-align: center; font-family: sans-serif;">
    <h1>Sign Language Translator</h1>
    <img src="{{ url_for('video_feed') }}" width="640" height="480" style="border: 3px solid #333;">
    
    <div style="margin-top: 20px;">
        <h3>English: <span id="en">...</span></h3>
        <h3>Hindi: <span id="hi">...</span></h3>
        <h3>Kannada: <span id="kn">...</span></h3>
        <button onclick="speak('en')">🔊 EN</button>
        <button onclick="speak('hi')">🔊 HI</button>
        <button onclick="speak('kn')">🔊 KN</button>
    </div>

    <script>
        setInterval(async () => {
            const res = await fetch('/get_data');
            const data = await res.json();
            document.getElementById('en').innerText = data.en;
            document.getElementById('hi').innerText = data.hi;
            document.getElementById('kn').innerText = data.kn;
        }, 1000);

        function speak(lang) {
            const text = document.getElementById(lang).innerText;
            const msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
