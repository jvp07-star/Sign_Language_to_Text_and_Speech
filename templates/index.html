<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language to Text and Speech</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1c1c1e;
            --accent-color: #007aff;
            --text-main: #ffffff;
            --text-muted: #a1a1a6;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            max-width: 1100px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .main-container {
                grid-template-columns: 1.2fr 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 4/3;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        img#webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .translation-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .lang-box {
            background: #262629;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            padding-right: 70px; /* Prevent text running under speech button */
        }

        .lang-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .output-text {
            font-size: 1.4rem;
            font-weight: 500;
            min-height: 32px;
            margin: 0;
            display: flex;
            align-items: center;
            word-break: break-word;
        }

        .speak-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }

        .speak-btn:hover {
            background-color: #0063cc;
        }

        .speak-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        .speak-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .instructions-card {
            margin-top: 10px;
            width: 100%;
            box-sizing: border-box;
            align-items: flex-start;
        }

        .instructions-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            width: 100%;
        }

        .shortcut-item {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .shortcut-key {
            background: #262629;
            border: 1px solid var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-main);
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Sign Language Translator</h1>

    <div class="main-container">
        <div class="card">
            <div class="video-wrapper">
                <img id="webcam" src="/video_feed">
            </div>
        </div>

        <div class="card">
            <div class="translation-container">

                <div class="lang-box">
                    <div class="lang-label">English</div>
                    <p class="output-text" id="english-text">Scanning...</p>
                    <button class="speak-btn" onclick="speakText('english-text', 'en')" title="Speak English (E)">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                </div>

                <div class="lang-box">
                    <div class="lang-label">Hindi (हिंदी)</div>
                    <p class="output-text" id="hindi-text">...</p>
                    <button class="speak-btn" onclick="speakText('hindi-text', 'hi')" title="Speak Hindi (H)">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                </div>

                <div class="lang-box">
                    <div class="lang-label">Kannada (ಕನ್ನಡ)</div>
                    <p class="output-text" id="kannada-text">...</p>
                    <button class="speak-btn" onclick="speakText('kannada-text', 'kn')" title="Speak Kannada (K)">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                </div>

                <div class="card instructions-card">
                    <div class="instructions-title">System Key Map Controls</div>
                    <div class="shortcuts-grid">
                        <div class="shortcut-item"><span class="shortcut-key">E</span> Speak English</div>
                        <div class="shortcut-item"><span class="shortcut-key">H</span> Speak Hindi</div>
                        <div class="shortcut-item"><span class="shortcut-key">K</span> Speak Kannada</div>
                        <div class="shortcut-item"><span class="shortcut-key">Backspace</span> Delete Word</div>
                        <div class="shortcut-item"><span class="shortcut-key">Delete</span> Clear All</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Fetch updates from background loop pipeline every 400ms
    setInterval(fetchData, 400);

    function fetchData() {
        fetch('/get_data')
            .then(response => response.json())
            .then(data => {
                document.getElementById('english-text').innerText = data.en || "Scanning...";
                document.getElementById('hindi-text').innerText = data.hi || "...";
                document.getElementById('kannada-text').innerText = data.kn || "...";
            })
            .catch(err => console.error("Data pipe sync error:", err));
    }

    // NEW: Client-side Browser Text-to-Speech Engine
    function speakText(elementId, languageCode) {
        const stringText = document.getElementById(elementId).innerText;

        // Safety guard checks
        if (!stringText || stringText === "Scanning..." || stringText === "...") return;
        if (!('speechSynthesis' in window)) {
            alert("Your browser does not support Speech Synthesis. Try Google Chrome or Microsoft Edge.");
            return;
        }

        // Cancel any audio that is currently playing to prevent overlaps
        window.speechSynthesis.cancel();

        // Create the speech payload
        const utterance = new SpeechSynthesisUtterance(stringText);

        // Map language codes to complete system locale tags
        if (languageCode === 'en') utterance.lang = 'en-US';
        else if (languageCode === 'hi') utterance.lang = 'hi-IN';
        else if (languageCode === 'kn') utterance.lang = 'kn-IN';

        // Adjust speed slightly for clearer articulation
        utterance.rate = 0.9;

        // Execute speech straight out of your browser speakers
        window.speechSynthesis.speak(utterance);
        console.log("Browser playing audio directly: " + stringText);
    }

    function executeControlAction(endpoint) {
        fetch('/action/' + endpoint, { method: 'POST' })
            .then(res => res.json())
            .then(() => fetchData())
            .catch(err => console.error("Action error:", err));
    }

    // Global key event listeners
    document.addEventListener('keydown', function(event) {
        if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;

        if (event.key === 'e' || event.key === 'E') speakText('english-text', 'en');
        if (event.key === 'h' || event.key === 'H') speakText('hindi-text', 'hi');
        if (event.key === 'k' || event.key === 'K') speakText('kannada-text', 'kn');
        if (event.key === 'Backspace') executeControlAction('delete_word');
        if (event.key === 'Delete') executeControlAction('clear_all');
    });
    </script>
</body>
</html>
