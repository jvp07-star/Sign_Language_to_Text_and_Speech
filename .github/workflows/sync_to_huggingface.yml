name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] # Change this to master if your default branch is master

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git rm --cached hand_landmarker.task isl_skeleton_model.h5 || true
          git commit -m "Exclude binary models from sync" || true
          git push --force https://jvp07-star:$HF_TOKEN@huggingface.co/spaces/jvp07-star/mudravoice main

        
