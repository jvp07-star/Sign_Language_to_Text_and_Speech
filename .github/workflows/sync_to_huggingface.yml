name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Set a dummy identity so git doesn't crash
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. Force untrack and delete the model files from this sync run
          git rm --cached hand_landmarker.task || true
          git rm --cached isl_skeleton_model.h5 || true
          
          # 3. Commit this change locally on the runner
          git commit -m "Remove large files from deployment sync" || true
          
          # 4. Push only the light web code to Hugging Face
          git push --force https://jvp07-star:$HF_TOKEN@huggingface.co/spaces/jvp07-star/mudravoice main
