name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Push Code Files Only
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configure dummy identity
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. Completely delete the large files from the runner instance
          rm -f hand_landmarker.task isl_skeleton_model.h5 processed_dataset.zip
          
          # 3. Initialize a brand new, empty git repo in this folder to wipe the history
          rm -rf .git
          git init -b main
          git remote add origin https://jvp07-star:$HF_TOKEN@huggingface.co/spaces/jvp07-star/mudravoice
          
          # 4. Add only the remaining code files, commit, and force push
          git add .
          git commit -m "Deploy text assets and scripts only"
          git push --force origin main
